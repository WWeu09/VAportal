<div class="container">
<h1>AutoTrack Direct Demo</h1>
<table id="carsTable">
  <thead>
    <tr>
      <th>Email</th><th>Kenteken</th><th>Status</th><th>Prijs</th><th>Notities</th><th>Laatste update</th><th>Acties</th>
    </tr>
  </thead>
  <tbody><tr class="status-In_behandeling">
      <td>jyakd55@gmail.com</td>
      <td>AB123CD</td>
      <td>In behandeling</td>
      <td>50</td>
      <td>Controle olie</td>
      <td>2026-03-21T07:00:00.000Z</td>
      <td>
        <button onclick="updateStatus(&quot;AB123CD&quot;,&quot;In behandeling&quot;)">In behandeling</button>
        <button onclick="updateStatus(&quot;AB123CD&quot;,&quot;Afgerond&quot;)">Afgerond</button>
        <button onclick="updateStatus(&quot;AB123CD&quot;,&quot;Klaar om op te halen&quot;)">Klaar ophalen</button>
      </td>
    </tr><tr class="status-Klaar_om_op_te_halen">
      <td>vanappiah.com@gmail.com</td>
      <td>XY987ZT</td>
      <td>Klaar om op te halen</td>
      <td>75</td>
      <td>Nieuwe banden</td>
      <td>2026-03-21T08:00:00.000Z</td>
      <td>
        <button onclick="updateStatus(&quot;XY987ZT&quot;,&quot;In behandeling&quot;)">In behandeling</button>
        <button onclick="updateStatus(&quot;XY987ZT&quot;,&quot;Afgerond&quot;)">Afgerond</button>
        <button onclick="updateStatus(&quot;XY987ZT&quot;,&quot;Klaar om op te halen&quot;)">Klaar ophalen</button>
      </td>
    </tr></tbody>
</table>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxovX8rx1zw2vH7SCTcOk2HhPHYsGOEJphGLlR5KNrUVZzN_mAHZEL8wHukX7NwGu3N/exec";

function fetchCars(){
  fetch(API_URL)
    .then(r=>r.json())
    .then(data=>{
      if(data.success) renderCars(data.cars);
      else alert("Fout bij laden data");
    });
}

function renderCars(cars){
  const tbody = document.querySelector("#carsTable tbody");
  tbody.innerHTML = "";
  cars.forEach(car=>{
    const tr = document.createElement("tr");
    tr.className = "status-" + car.status.replace(/ /g,"_");
    tr.innerHTML = `
      <td>${car.email||""}</td>
      <td>${car.plate||""}</td>
      <td>${car.status||""}</td>
      <td>${car.price||""}</td>
      <td>${car.notes||""}</td>
      <td>${car.updated||""}</td>
      <td>
        <button onclick='updateStatus("${car.plate}","In behandeling")'>In behandeling</button>
        <button onclick='updateStatus("${car.plate}","Afgerond")'>Afgerond</button>
        <button onclick='updateStatus("${car.plate}","Klaar om op te halen")'>Klaar ophalen</button>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

function updateStatus(plate,newStatus){
  fetch(API_URL, {
    method:"POST",
    body: JSON.stringify({ plate, status:newStatus })
  })
  .then(r=>r.json())
  .then(resp=>{
    if(resp.success) fetchCars();
    else alert("Update mislukt");
  });
}

// Start
fetchCars();
</script>
